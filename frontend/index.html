<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>Sistema de autenticação</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <div id="toast" style="display: none;">
    </div>

    <main>
        <header>
            <img class="auth-image" src="../assets/images/autenticacao-de-usuario.png" alt="">
            <h1>Sistema de autenticação</h1>
            <p>Seja bem-vindo(a)</p>
        </header>

        <form action="submit" id="login-form">
            <label for="email">
                E-mail:
            </label>
            <input type="email" placeholder="teste@email.com" name="email" id="email">
            <label for="password">
                Senha:
            </label>
            <input type="password" name="password" id="password" placeholder="Digite a sua senha">
            <button>Entrar</button>
        </form>


    </main>
</body>

<script>
    const formulario = document.getElementById('login-form');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password')
    const toast = document.getElementById('toast')

    formulario.addEventListener('submit', function (event) {
        event.preventDefault();
        const emailDigitado = emailInput.value;
        const senhaDigitada = passwordInput.value;

        if (emailDigitado.trim() === "") {
            exibirMensagem("O e-mail não pode estar vazio")
            return;
        } if (senhaDigitada.trim() === "") {
            exibirMensagem("A senha não pode estar vazia")
            return;
        } else {
            enviarDados(emailDigitado, senhaDigitada)
        }



    })

    async function enviarDados(email, senha) {
        const url = 'http://localhost:3000/login'

        const dados = {
            email,
            senha
        };

        const response = await fetch(url, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(dados)
        });

        const data = await response.json();

        if (response.ok) {
            window.location.href = 'home.html'
        } else {
            exibirMensagem(data.erro)
        }




    }

    function exibirMensagem(mensagem) {
        toast.style.display = "block";
        toast.textContent = mensagem

        setTimeout(function () {
            toast.style.display = "none";

        }, 3000);
    }

</script>

</html>
