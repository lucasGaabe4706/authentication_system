<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>Sistema de autenticação</title>
</head>

<body>
    <main>
        <header>

            <h1>Sistema de autenticação</h1>
            <p>Seja bem-vindo(a)</p>
        </header>

        <form action="submit" id="login-form">
            <label for="email">
                E-mail:
            </label>
            <input type="email" placeholder="teste@email.com" name="email" id="email">
            <label for="password">
                Senha:
            </label>
            <input type="password" name="password" id="password">
            <button>Entrar</button>
        </form>
    </main>
</body>

<script>
    const formulario = document.getElementById('login-form');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password')


    formulario.addEventListener('submit', function (event) {
        event.preventDefault();
        const emailDigitado = emailInput.value;
        const senhaDigitada = passwordInput.value;

        if (emailDigitado.trim() === "") {
            alert("O e-mail não pode estar vazio")
            return;
        } if (senhaDigitada.trim() === "") {
            alert("A senha não pode estar vazia")
            return;
        } else {
            enviarDados(emailDigitado, senhaDigitada)
        }



    })

    async function enviarDados(email, senha) {
        const url = 'http://localhost:3000/login'

        const dados = {
            email,
            senha
        };

        try {
            const response = await fetch(url, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(dados)

            });
            if (!response.ok) {
                throw new Error(`HTTP error! Status: ${response.status}`)
            }

            const data = await response.json();
            console.log('Login feito com sucesso')
        } catch (error) {
            console.error('Falha no login')
        }
    }
</script>

</html>
